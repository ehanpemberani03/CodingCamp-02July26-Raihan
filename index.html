<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="dashboard">

     <div class="theme-switch">
      <button id="theme-toggle" aria-label="Toggle Theme">
        🌙
      </button>
    </div>
    
      <!-- Greeting Widget -->
      <section id="greeting-widget" class="widget" aria-label="Greeting">
        <div class="greeting-header">
          <p id="greeting-text" class="greeting-text"></p>
          <button id="greeting-name-btn" class="greeting-name-btn" aria-label="Edit name">⚙️</button>
        </div>
        <p id="greeting-clock" class="greeting-clock" aria-live="polite" aria-atomic="true"></p>
        <p id="greeting-date" class="greeting-date"></p>
      </section>

      <!-- Focus Timer Widget -->
      <section id="timer-widget" class="widget" aria-label="Focus Timer">
        <h2 class="widget-title">Focus Timer</h2>
        <p id="timer-display" class="timer-display" aria-live="polite" aria-atomic="true">25:00</p>
        <p id="timer-message" class="timer-message" aria-live="polite" role="status"></p>
        <div class="timer-controls">
          <button id="timer-btn-start" type="button">Start</button>
          <button id="timer-btn-stop" type="button" disabled>Stop</button>
          <button id="timer-btn-reset" type="button">Reset</button>
        </div>
      </section>

      <!-- To-Do List Widget -->
      <section id="todo-widget" class="widget" aria-label="To-Do List">
        <div class="todo-header">
          <h2 class="widget-title">To-Do List</h2>
          <div class="sort-buttons">
            <button id="sort-date-btn" class="sort-btn" aria-label="Sort by date" title="Sort by date">📅</button>
            <button id="sort-name-btn" class="sort-btn" aria-label="Sort alphabetically" title="Sort A-Z">🔤</button>
            <button id="sort-status-btn" class="sort-btn" aria-label="Sort by status" title="Sort by status">✓</button>
          </div>
        </div>
        <div class="todo-input-row">
          <label for="todo-input" class="sr-only">New task</label>
          <input
            id="todo-input"
            type="text"
            placeholder="Add a new task…"
            maxlength="500"
            autocomplete="off"
          />
          <button id="todo-add-btn" type="button">Add</button>
        </div>
        <ul id="todo-list" class="todo-list" aria-label="Tasks" aria-live="polite"></ul>
      </section>

      <!-- Quick Links Widget -->
      <section id="links-widget" class="widget" aria-label="Quick Links">
        <h2 class="widget-title">Quick Links</h2>
        <div id="links-container" class="links-container" aria-label="Saved links"></div>
        <div class="links-input-row">
          <label for="links-label-input" class="sr-only">Link label</label>
          <input
            id="links-label-input"
            type="text"
            placeholder="Label"
            maxlength="100"
            autocomplete="off"
          />
          <label for="links-url-input" class="sr-only">Link URL</label>
          <input
            id="links-url-input"
            type="url"
            placeholder="https://example.com"
            maxlength="2048"
            autocomplete="off"
          />
          <button id="links-add-btn" type="button">Add Link</button>
        </div>
      </section>

    </main>

    <script src="js/app.js" defer></script>
  </body>
</html>
